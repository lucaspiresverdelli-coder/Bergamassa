<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quebrando</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
        }

        .area-da-imagem {
            position: relative;
            width: 800px; 
            height: 600px;
            background-image: url('Garsom.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .bloco {
            position: absolute;
            background-color: rgba(45, 20, 20, 0.85);
            color: white;
            border-left: 4px solid #00aeff;
            padding: 12px 20px;
            border-radius: 4px;
            width: 220px;
            text-align: left;
            font-weight: 500;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bloco:hover {
            background-color: #ff50bc;
            transform: scale(1.05);
            border-left-color: #0084ff;
        }

        .bloco-php {
            top: 25%;
            left: 5%;
        }

        .bloco-git {
            top: 55%;
            left: 8%;
        }

        .bloco-gitlab {
            top: 85%;
            left: 10%;
        }
    </style>
</head>
<body>

    <div class="area-da-imagem">
        <div class="bloco bloco-php">Um pouquinho de php</div>
        <div class="bloco bloco-git">aula sobre Git</div>
        <div class="bloco bloco-gitlab">aula sobre GitLab</div>
    </div>

</body>
</html>
